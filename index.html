<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(주)비에이텍 - 물 그 이상의 가치</title>
    <style>
        /* 기존 홈페이지 스타일 모사 */
        body, html { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        
        /* 메인 배경 (보내주신 현미경 이미지 스타일) */
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1579152128802-e95b9b1ad44a?q=80&w=2070&auto=format&fit=crop'); /* 임시 배경 */
            background-size: cover; background-position: center;
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: white; text-align: center;
        }

        .hero-section h1 { font-size: 3rem; margin-bottom: 10px; }
        .hero-section p { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.9; }

        /* 버튼 컨테이너 */
        .btn-group { display: flex; gap: 15px; flex-direction: column; align-items: center; }

        /* 기존 파란 버튼 */
        .primary-btn {
            background-color: #00a8ff; color: white; border: none;
            padding: 12px 35px; border-radius: 25px; font-weight: bold; cursor: pointer;
        }

        /* [핵심] 새로 추가되는 물방울 슬라이드 버튼 */
        .vision-slide-btn {
            background-color: rgba(255, 255, 255, 0.2);
            color: white; border: 2px solid white;
            padding: 12px 35px; border-radius: 25px; font-weight: bold;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .vision-slide-btn:hover { background: white; color: #004a99; }

        /* --- 슬라이드쇼 팝업창 디자인 --- */
        #slideshow-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999;
            display: none; align-items: center; justify-content: center;
        }

        .slide-img { max-width: 90%; max-height: 85vh; display: none; border: 2px solid #444; }
        .slide-img.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-btn {
            position: absolute; background: none; border: none; color: white;
            font-size: 40px; cursor: pointer; padding: 20px; z-index: 10000;
        }
        #prev { left: 20px; } #next { right: 20px; }
        #close { top: 20px; right: 20px; font-size: 20px; background: rgba(255,0,0,0.5); border-radius: 5px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1>물, 그 이상의 가치를 만듭니다</h1>
        <p>(주)비에이텍은 워터펌프 제작, 설치, 수리 분야의 기술력을 바탕으로 깨끗한 수자원 관리를 선도합니다.</p>
        
        <div class="btn-group">
            <button class="primary-btn">제품 둘러보기</button>
            
            <button class="vision-slide-btn" id="openSlides">
                <span>💧</span> 친환경 비전 슬라이드 보기
            </button>
        </div>
    </div>

    <div id="slideshow-overlay">
        <button id="close" class="nav-btn">닫기 ✖</button>
        <button id="prev" class="nav-btn">❮</button>
        
        <div id="img-container">
            <img src="cam1.png" class="slide-img active">
            <img src="cam2.png" class="slide-img">
            <img src="cam3.png" class="slide-img">
            <img src="cam4.png" class="slide-img">
            <img src="cam5.png" class="slide-img">
            <img src="cam6.png" class="slide-img">
            <img src="cam7.png" class="slide-img">
            <img src="cam8.png" class="slide-img">
        </div>
        
        <button id="next" class="nav-btn">❯</button>
    </div>

    <script>
        const overlay = document.getElementById('slideshow-overlay');
        const openBtn = document.getElementById('openSlides');
        const closeBtn = document.getElementById('close');
        const slides = document.querySelectorAll('.slide-img');
        let current = 0;

        // 열기
        openBtn.onclick = () => {
            overlay.style.display = 'flex';
            current = 0;
            show(0);
        };

        // 닫기
        closeBtn.onclick = () => overlay.style.display = 'none';

        // 전환
        function show(idx) {
            slides.forEach(s => s.classList.remove('active'));
            slides[idx].classList.add('active');
        }

        document.getElementById('next').onclick = () => {
            current = (current + 1) % slides.length;
            show(current);
        };

        document.getElementById('prev').onclick = () => {
            current = (current - 1 + slides.length) % slides.length;
            show(current);
        };
    </script>
</body>
</html>
