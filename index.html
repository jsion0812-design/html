<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비에이텍 슬라이드쇼</title>
    <style>
        /* CSS: 디자인 */
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f9;
        }

        /* 첫 화면 */
        #start-screen {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; text-align: center;
        }

        #start-btn {
            font-size: 100px; cursor: pointer; transition: transform 0.3s ease;
            user-select: none; margin-bottom: 20px;
        }

        #start-btn:hover { transform: scale(1.2); }

        /* 슬라이드쇼 컨테이너 */
        #slideshow-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); display: flex;
            align-items: center; justify-content: center; z-index: 1000;
        }

        .hidden { display: none !important; }

        /* 이미지 스타일 */
        .slide {
            max-width: 95%; max-height: 90vh; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .slide.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 컨트롤 버튼 */
        .nav-btn {
            position: absolute; background: rgba(255, 255, 255, 0.15);
            color: white; border: none; padding: 20px; cursor: pointer;
            font-size: 30px; border-radius: 50%; transition: 0.3s;
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.3); }
        #prev-btn { left: 30px; }
        #next-btn { right: 30px; }
        #close-btn { 
            top: 20px; right: 20px; font-size: 20px; border-radius: 5px;
            background: rgba(255, 0, 0, 0.4); padding: 10px 15px;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div id="start-btn">💧</div>
        <h2>비에이텍 친환경 비전</h2>
        <p>물방울 이모티콘을 클릭하여 슬라이드를 확인하세요.</p>
    </div>

    <div id="slideshow-container" class="hidden">
        <div id="slide-wrapper">
            <img src="images/cam1.png" class="slide active">
            <img src="images/cam2.png" class="slide">
            <img src="images/cam3.png" class="slide">
            <img src="images/cam4.png" class="slide">
            <img src="images/cam5.png" class="slide">
            <img src="images/cam6.png" class="slide">
            <img src="images/cam7.png" class="slide">
            <img src="images/cam8.png" class="slide">
        </div>

        <button id="prev-btn" class="nav-btn">❮</button>
        <button id="next-btn" class="nav-btn">❯</button>
        <button id="close-btn" class="nav-btn">닫기 ✖</button>
    </div>

    <script>
        /* JS: 동작 로직 */
        const startBtn = document.getElementById('start-btn');
        const slideshow = document.getElementById('slideshow-container');
        const startScreen = document.getElementById('start-screen');
        const slides = document.querySelectorAll('.slide');
        let currentIndex = 0;

        // 슬라이드 쇼 열기
        startBtn.onclick = () => {
            slideshow.classList.remove('hidden');
            startScreen.classList.add('hidden');
        };

        // 슬라이드 쇼 닫기
        document.getElementById('close-btn').onclick = () => {
            slideshow.classList.add('hidden');
            startScreen.classList.remove('hidden');
        };

        // 이미지 전환 함수
        function changeSlide(n) {
            slides[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + n + slides.length) % slides.length;
            slides[currentIndex].classList.add('active');
        }

        document.getElementById('next-btn').onclick = () => changeSlide(1);
        document.getElementById('prev-btn').onclick = () => changeSlide(-1);

        // 키보드 화살표 지원
        document.addEventListener('keydown', (e) => {
            if (!slideshow.classList.contains('hidden')) {
                if (e.key === 'ArrowRight') changeSlide(1);
                if (e.key === 'ArrowLeft') changeSlide(-1);
                if (e.key === 'Escape') document.getElementById('close-btn').click();
            }
        });
    </script>
</body>
</html>
